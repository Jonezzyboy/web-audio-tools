<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAV to MP3 Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <link rel="stylesheet" href="theme.css">
  <style>
    /* Page-specific styles */
    .card {
      text-align: center;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      padding: 30px;
      border-radius: 8px;
      margin: 20px 0;
      transition: all 0.2s;
      cursor: pointer;
      background: #fafafa;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: #eef6ff;
    }

    .drop-zone p {
      margin: 0;
      color: #666;
      font-size: 0.9rem;
      pointer-events: none;
    }

    input[type="file"] {
      display: none;
    }

    .options-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .options-row select {
      padding: 6px;
      border: 1px solid #dcdde1;
      border-radius: 4px;
      font-family: monospace;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    .success {
      color: #28a745;
    }

    .error {
      color: #dc3545;
    }

    .processing {
      color: var(--primary);
    }

    /* Spinner */
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
      display: none;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

<div class="card">
  <a class="back-link" href="../index.html">← All tools</a>
  <h1>WAV to MP3</h1>

  <div class="drop-zone" id="dropZone">
    <p>Drag & Drop WAV files here<br>or click to browse</p>
  </div>
  <input type="file" id="fileInput" accept="audio/wav, audio/x-wav" multiple>

  <div class="options-row">
    <label for="bitrate">MP3 Bitrate</label>
    <select id="bitrate">
      <option value="96">96 kbps</option>
      <option value="128" selected>128 kbps</option>
      <option value="192">192 kbps</option>
      <option value="320">320 kbps</option>
    </select>
  </div>

  <div id="status"></div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const status = document.getElementById('status');

  // --- UI Handling ---
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) =>
  {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', (e) =>
  {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if(e.dataTransfer.files.length)
    {
      handleFiles(e.dataTransfer.files);
    }
  });

  fileInput.addEventListener('change', (e) =>
  {
    if(e.target.files.length)
    {
      handleFiles(e.target.files);
    }
    // Reset so selecting the same file again re-fires 'change'
    fileInput.value = '';
  });

  // --- Conversion Logic ---
  function isWav(file)
  {
    return file.type.includes('wav') || /\.wav$/i.test(file.name);
  }

  async function handleFiles(fileList)
  {
    const files = Array.from(fileList).filter(isWav);
    if(!files.length)
    {
      showStatus('Error: Please upload WAV files.', 'error');
      return;
    }

    const kbps = parseInt(document.getElementById('bitrate').value, 10);
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let converted = 0;

    try
    {
      for(const file of files)
      {
        showStatus(
          `<div class="loader" style="display:inline-block"></div>Converting ${file.name} (${converted + 1}/${files.length})...`,
          'processing'
        );

        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const mp3Blob = convertBufferToMp3(audioBuffer, kbps);

        downloadBlob(mp3Blob, file.name.replace(/\.wav$/i, '') + '.mp3');
        converted++;
      }

      showStatus(`Success! Converted ${converted} file${converted > 1 ? 's' : ''}.`, 'success');
    }
    catch(err)
    {
      console.error(err);
      showStatus(`Error converting file ${converted + 1} of ${files.length}. See console.`, 'error');
    }
    finally
    {
      audioCtx.close();
    }
  }

  function downloadBlob(blob, filename)
  {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => window.URL.revokeObjectURL(url), 1000);
  }

  function showStatus(msg, type)
  {
    status.innerHTML = msg;
    status.className = type;
  }

  // --- THE LAMEJS ENCODER HELPER ---
  // Convert Float32 (-1.0 to 1.0) to Int16 (-32768 to 32767)
  // LAME requires Integer PCM input
  function floatTo16(samples)
  {
    const out = new Int16Array(samples.length);
    for(let i = 0; i < samples.length; i++)
    {
      const s = Math.max(-1, Math.min(1, samples[i]));
      out[i] = Math.round(s < 0 ? s * 0x8000 : s * 0x7FFF);
    }
    return out;
  }

  function convertBufferToMp3(buffer, kbps)
  {
    const channels = Math.min(2, buffer.numberOfChannels);
    const mp3encoder = new lamejs.Mp3Encoder(channels, buffer.sampleRate, kbps);
    const mp3Data = [];

    const left = floatTo16(buffer.getChannelData(0));
    const right = channels === 2 ? floatTo16(buffer.getChannelData(1)) : null;

    // Encode in chunks
    const sampleBlockSize = 1152; // multiple of 576
    for(let i = 0; i < left.length; i += sampleBlockSize)
    {
      const leftChunk = left.subarray(i, i + sampleBlockSize);
      const mp3buf = right
        ? mp3encoder.encodeBuffer(leftChunk, right.subarray(i, i + sampleBlockSize))
        : mp3encoder.encodeBuffer(leftChunk);
      if(mp3buf.length > 0)
      {
        mp3Data.push(mp3buf);
      }
    }

    // Finish
    const mp3buf = mp3encoder.flush();
    if(mp3buf.length > 0)
    {
      mp3Data.push(mp3buf);
    }

    return new Blob(mp3Data, {type: 'audio/mp3'});
  }
</script>

</body>
</html>
